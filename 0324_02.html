<!DOCTYPE html>
<html>
    <head>
        <title></title>
        <style>
            #header. #content, #footer {
                width: 900px;
                overflow: hidden;
            }
            
            #header  div.center_space {
                width: 100px;
                border: 1px solid;
                border-radius: 30px 0px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #header  div.right_space {
                width: 650px;
                border: 1px solid;
                border-radius: 0px 0px 30px 30px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #header  div.left_space {
                width: 100px;
                border: 1px solid;
                border-radius: 0px 30px;
                padding: 100px;
                float: right;
                background-color: #eeeeee;
            }
            #content  div.left_space {
                width: 100px;
                height: 76px;
                border: 1px solid;
                border-radius: 0px 30px 30px 0px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #content  div.right_space {
                width: 100px;
                height: 76px;
                border: 1px solid;
                border-radius: 30px 0px 0px 30px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #content  div.center_space {
                width: 850px;
                border: 1px solid;
                border-radius: 30px;
                padding: 0px;
                float: left;
                background-color: #eeeeee;
            }
            #content  div.hiseoul {
                width: 700px;
                
                border-radius: 30px;
                padding: 35px;
                float: left;
                background-color: #eeeeee;
            }
            
            ul>li {
                list-style: none;
                float: left;
                width: 200px;

            }
            #footer  div.center_space {
                width: 100px;
                border: 1px solid;
                border-radius: 0px 30px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #footer  div.right_space {
                width: 650px;
                border: 1px solid;
                border-radius: 30px 30px 00px 0px;
                padding: 100px;
                float: left;
                background-color: #eeeeee;
            }
            #footer  div.left_space {
                width: 100px;
                border: 1px solid;
                border-radius: 30px 00px 30px 0px;
                padding: 100px;
                float: right;
                background-color: #eeeeee;
            }

        </style>
    </head>
    <body>
    
    <div id="header">
        <div class="left_space"></div>
        <div class="center_space"></div>
        <div class="right_space"></div>
    </div>

    <div id="content">
        <div class="left_space"></div>
        <div class="center_space">
            <div>
                <ul>
                    <li>menu1</li>
                    <li>menu2</li>
                    <li>menu3</li>
                    <li>menu4</li>
                </ul>
            </div>
            <div class="hiseoul">
                <h1>고색고등학교</h1>
                <p>고색고등학교는 ‘고색 Dynamic 인재 육성 프로그램’을 바탕으로 학생 한 사람 한 사람의 가능성을 존중하며,
자율과 책임 속에서 역량을 기를 수 있는 교육을 실천하고 있습니다. 학생이 자기 주도적으로 탐구하고 삶과 연결된 배움을 통해 성숙한 품성을 키울 수 있도록 돕는 것이 고색의 교육 목표입니다.</p>
            </div>
        </div>
        
        <div class="right_space"></div>
    </div>

    <div id="footer">
        <div class="left_space"></div>
        <div class="center_space"></div>
        <div class="right_space"></div>
    </div>
    </body>
</html>
