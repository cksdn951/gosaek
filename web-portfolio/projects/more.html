<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MY PROFILE</title>



    <style>
        /* 폰트 크기 및 색상 */
        h1 { font-size: 28px; }
        h2 { font-size: 22px; }
        p { font-size: 16px; }
        .point { color: #4f46e5; } /* 포인트 컬러 */

		
		#all {
			text-align : center;
		}
		
		
		
        /* 상단 네비게이션 (Flex 양끝 배치) */
        nav {
            display: flex; 
            justify-content: space-between;
        }

        nav a {
            color: black; 
            margin-left: 10px; 
        }

        nav a:hover {
            color: #4f46e5; 
        } /* 마우스 오버 효과 */

        


        /* 3. 메인 소개 (Flex 좌우 배치) */
        #hero {
            display: flex; 
            margin-top: 30px; 
            gap: 40px;

            justify-content: center;    /* 정가운데 정렬 */

        }

        #hero img {
            width: 150px; 
            height: 150px; 
            border-radius: 8px; 
        } /* 8px 라운드 (요구사항) */

        #button {
            background-color: #4f46e5; 
            color: white;
        }




        /* 관심 분야 전체 배경  */
        #interests {
            background-color: #f3f4f6;
            padding: 20px;
        }


		
		
        /* 제목 가운데 정렬 */
        #interests h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* 부모 박스 (.box) 에 Flex 켜기 */
        .box {
            display: flex;
            gap: 15px; /* 카드 사이의 간격 */
        }

        /* 개별 카드 (.item) 에 테두리랑 크기 주기 */
        .item {
            border: 5px solid hotpink;
            padding: 15px;
            flex: 1; /* 카드 3개가 가로 길이를 1:1:1로 똑같이 나눠 가짐 */
            border-radius: 8px; /* 모서리 둥글게 깎기 */
        }




        /* 연락처 */
        #contact .body {
            display: flex;
            flex-direction: column;   /* 세로로 정렬 */
            
            /* 정중앙으로 모으기 */
            align-items: center;         
            text-align: center;
        }

        input, textarea, button {

            width: 250px;
            text-align: center;
        }
    </style>






</head>
<body>
    <section id="all">

		<nav>
			<div class="point">MY PROFILE</div>
			<div>
				<a href="#hero">소개</a> 
				<a href="#interests">관심사</a> 
				<a href="#contact">연락처</a>
			</div>
		</nav>


		<section id="hero">
			<img src="../images/1.webp">
			<div>
				<h1>안녕하세요, [이름]입니다.</h1>
				<p>여기에 본인의 꿈이나 소개글을 입력합니다.</p>

				<button id = "button">자세히 보기</button>
			</div>
		</section>


		<section id="interests">
			<h2>관심 분야</h2>

			<div class="box">
				<div class="item">
					<h3>항목 1</h3>
					<p>설명 텍스트</p>
				</div>

				<div class="item">
					<h3>항목 2</h3>
					<p>설명 텍스트</p>
				</div>

				<div class="item">
					<h3>항목 3</h3>
					<p>설명 텍스트</p>
				</div>
			</div>
		</section>


		<section id="contact">
			<div class="body">
				<h2>연락처</h2>
				<input type="text" id="userName" placeholder="이름">
				<textarea placeholder="메시지"></textarea>
				<button onclick="check()">보내기</button>
			</div>
		</section>
	</section>

    <script>
        function check() {
            let name = document.getElementById('userName').value;
            if(name == "") {
                alert("***이름을 입력해주세요!***");
            } else {
                alert("***메시지가 전송되었습니다.***");
            }
        }
    </script>

</body>
</html>
